<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gabachin Store - Elegancia y Estilo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #0A1128;
            --navy-light: #1c2b59;
            --cream: #F9F6F0;
            --cream-dark: #E8E3D9;
            --gold: #C5A059;
            --gold-hover: #b08d4b;
            --olive: #707A4F;
            --olive-dark: #565E3D;
            --olive-soft: #EDEFE4;
            --text-dark: #1A1A1A;
            --text-muted: #5A5A5A;
            --danger: #8B0000;
            --success: #1e7e34;
            --radius: 16px;
            --transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--cream);
            color: var(--navy);
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        h1, h2, h3, h4, .logo { font-family: 'Cormorant Garamond', serif; }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--cream); }
        ::-webkit-scrollbar-thumb { background: var(--navy); border-radius: 10px; }

        /* ============ HEADER ============ */
        header {
            position: sticky;
            top: 0;
            background: rgba(249, 246, 240, 0.95);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            z-index: 1000;
            border-bottom: 1px solid var(--cream-dark);
            box-shadow: 0 4px 30px rgba(10, 17, 40, 0.08);
        }

        .menu-container { position: relative; display: flex; align-items: center; }

        .menu-btn {
            background: transparent;
            border: none;
            color: var(--navy);
            cursor: pointer;
            padding: 5px 15px;
            border-radius: var(--radius);
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
        }

        .menu-btn:hover { background: rgba(10, 17, 40, 0.05); transform: scale(1.05); }
        .menu-btn svg { width: 28px; height: 28px; }
        .menu-text { font-size: 0.65rem; font-weight: 600; letter-spacing: 1.5px; }

        .dropdown-menu {
            position: absolute;
            top: 120%;
            left: 0;
            background: var(--navy);
            border-radius: var(--radius);
            padding: 15px 0;
            min-width: 220px;
            max-height: 70vh;
            overflow-y: auto;
            box-shadow: 0 20px 40px rgba(10, 17, 40, 0.2);
            opacity: 0;
            visibility: hidden;
            transform: translateY(-15px) scale(0.95);
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 1001;
            transform-origin: top left;
        }

        .dropdown-menu.open { opacity: 1; visibility: visible; transform: translateY(0) scale(1); }

        .dropdown-menu button {
            display: block;
            width: 100%;
            text-align: left;
            background: none;
            border: none;
            color: var(--cream);
            padding: 12px 25px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 500;
            font-size: 1rem;
            cursor: pointer;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .dropdown-menu button::before {
            content: '';
            position: absolute;
            left: 0; top: 0; height: 100%; width: 3px;
            background: var(--gold);
            transform: scaleY(0);
            transition: var(--transition);
        }

        .dropdown-menu button:hover, .dropdown-menu button.active {
            background: rgba(255, 255, 255, 0.05);
            color: var(--gold);
            padding-left: 35px;
        }
        .dropdown-menu button:hover::before, .dropdown-menu button.active::before { transform: scaleY(1); }

        .logo {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--navy);
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            cursor: pointer;
            transition: var(--transition);
        }
        .logo:hover { text-shadow: 0 5px 15px rgba(10, 17, 40, 0.2); }

        .cart-toggle {
            background: var(--navy);
            border: 1px solid var(--navy);
            color: var(--cream);
            padding: 12px 25px;
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            font-size: 1rem;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 12px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(10, 17, 40, 0.15);
        }
        .cart-toggle::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            width: 150%; height: 150%;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            transform: translate(-50%, -50%) scale(0);
            transition: transform 0.5s ease-out;
        }
        .cart-toggle:hover::after { transform: translate(-50%, -50%) scale(1); }
        .cart-toggle:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(10, 17, 40, 0.3); }
        .cart-toggle svg { width: 22px; height: 22px; fill: none; stroke: currentColor; stroke-width: 2; }

        @keyframes popDopamine {
            0% { transform: scale(1); }
            40% { transform: scale(1.15) rotate(3deg); color: var(--gold); }
            70% { transform: scale(0.95) rotate(-3deg); }
            100% { transform: scale(1); }
        }
        .pop-anim { animation: popDopamine 0.5s cubic-bezier(0.25, 1, 0.5, 1); }

        /* ============ HERO CAROUSEL ============ */
        .main-carousel-container {
            position: relative;
            width: 95%;
            max-width: 1400px;
            margin: 30px auto;
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(10, 17, 40, 0.15);
        }
        .main-carousel {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
            scrollbar-width: none;
        }
        .main-carousel::-webkit-scrollbar { display: none; }
        .main-carousel-item {
            min-width: 100%;
            height: 500px;
            scroll-snap-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            color: var(--cream);
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            position: relative;
            overflow: hidden;
        }
        .main-carousel-item::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to bottom, rgba(10, 17, 40, 0.2), rgba(10, 17, 40, 0.7));
            z-index: 1;
        }
        .main-carousel-item span { position: relative; z-index: 2; text-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        .carousel-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(249, 246, 240, 0.9);
            border: none;
            color: var(--navy);
            width: 55px;
            height: 55px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.5rem;
            z-index: 10;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .carousel-btn:hover { background: var(--olive-dark); color: var(--cream); transform: translateY(-50%) scale(1.1); }
        .prev-btn { left: 30px; }
        .next-btn { right: 30px; }

        /* ============ CATEGORY SECTIONS ============ */
        .category-section { margin: 60px 0; padding: 0 20px; }

        .section-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            margin-bottom: 26px;
            padding: 0 20px;
            max-width: 1400px;
            margin-left: auto;
            margin-right: auto;
            gap: 12px;
        }
        .section-titles {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            opacity: 0;
            transform: translateY(16px);
            transition: opacity 0.8s ease, transform 0.8s cubic-bezier(0.22, 1, 0.36, 1);
        }
        .category-section.revealed .section-titles { opacity: 1; transform: translateY(0); }
        .section-eyebrow {
            color: var(--olive-dark);
            font-size: 0.78rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .section-eyebrow::before, .section-eyebrow::after {
            content: '';
            width: 20px; height: 2px;
            background: var(--olive);
        }
        .section-title {
            font-size: 3rem;
            color: var(--navy);
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            position: relative;
            display: inline-block;
        }
        .section-title::after {
            content: '';
            position: absolute;
            bottom: 2px; left: 0; width: 100%; height: 3px;
            background: var(--gold);
            transform: scaleX(0);
            transform-origin: center;
            transition: transform 0.9s cubic-bezier(0.22, 1, 0.36, 1) 0.15s;
        }
        .category-section.revealed .section-title::after { transform: scaleX(1); }
        .section-count {
            color: var(--olive-dark);
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 1px;
            background: var(--olive-soft);
            padding: 6px 16px;
            border-radius: 50px;
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.8s ease 0.3s;
        }
        .category-section.revealed .section-count { opacity: 1; }

        /* Wrapper que aloja el carrusel + sus botones de navegación */
        .carousel-wrapper { position: relative; max-width: 1400px; margin: 0 auto; }

        .products-carousel {
            display: flex;
            gap: 30px;
            overflow-x: auto;
            padding: 10px 34px 40px 34px;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
            scroll-padding-left: 34px;
            -webkit-mask-image: linear-gradient(to right, transparent 0, black 34px, black calc(100% - 34px), transparent 100%);
            mask-image: linear-gradient(to right, transparent 0, black 34px, black calc(100% - 34px), transparent 100%);
        }
        .products-carousel::-webkit-scrollbar { height: 6px; }
        .products-carousel::-webkit-scrollbar-track { background: transparent; }
        .products-carousel::-webkit-scrollbar-thumb { background: rgba(10, 17, 40, 0.2); border-radius: 10px; }
        .products-carousel:hover::-webkit-scrollbar-thumb { background: var(--gold); }

        .mini-carousel-btn {
            position: absolute;
            top: 150px;
            transform: translateY(-50%);
            background: var(--cream);
            border: 1px solid var(--cream-dark);
            color: var(--navy);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.25rem;
            z-index: 6;
            transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1), background 0.3s ease, color 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 22px rgba(10, 17, 40, 0.18);
        }
        .mini-carousel-btn:hover {
            background: var(--olive-dark);
            color: var(--cream);
            transform: translateY(-50%) scale(1.15);
            box-shadow: 0 12px 30px rgba(86, 94, 61, 0.4);
        }
        .mini-carousel-btn:active { transform: translateY(-50%) scale(0.95); }
        .mini-carousel-btn.mini-prev { left: -6px; }
        .mini-carousel-btn.mini-next { right: -6px; }
        @media (min-width: 900px) {
            .mini-carousel-btn.mini-prev { left: -25px; }
            .mini-carousel-btn.mini-next { right: -25px; }
        }

        .product-card {
            min-width: 300px;
            max-width: 300px;
            background: white;
            border-radius: var(--radius);
            padding: 25px;
            border: 1px solid var(--cream-dark);
            transition: transform 0.5s cubic-bezier(0.22, 1, 0.36, 1), box-shadow 0.5s cubic-bezier(0.22, 1, 0.36, 1), border-color 0.4s ease;
            display: flex;
            flex-direction: column;
            gap: 15px;
            position: relative;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            scroll-snap-align: start;
            flex-shrink: 0;
            will-change: transform;
        }
        .product-card:hover {
            transform: translateY(-12px) scale(1.015);
            box-shadow: 0 28px 50px rgba(10, 17, 40, 0.16), 0 0 0 1px rgba(197, 160, 89, 0.25);
            border-color: var(--gold);
        }

        .product-img-wrapper { overflow: hidden; border-radius: calc(var(--radius) - 6px); position: relative; }
        .product-img-wrapper::after {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(to top, rgba(10,17,40,0.28), transparent 55%);
            opacity: 0;
            transition: opacity 0.45s ease;
            pointer-events: none;
        }
        .product-card:hover .product-img-wrapper::after { opacity: 1; }
        .product-img {
            width: 100%;
            height: 260px;
            background: #f4f4f4;
            border-radius: calc(var(--radius) - 6px);
            object-fit: cover;
            transition: transform 0.6s cubic-bezier(0.22, 1, 0.36, 1);
            display: block;
        }
        .product-card:hover .product-img { transform: scale(1.09) rotate(0.3deg); }

        .product-info { display: flex; flex-direction: column; flex-grow: 1; }
        .product-info h3 { font-size: 1.5rem; color: var(--navy); margin-bottom: 6px; transition: color 0.4s ease; }
        .product-card:hover .product-info h3 { color: var(--gold-hover); }
        .product-info p { color: var(--text-muted); font-size: 0.92rem; line-height: 1.5; flex-grow: 1; }
        .product-price {
            font-size: 1.35rem;
            color: var(--navy);
            font-weight: 600;
            margin-top: 12px;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: inline-block;
        }
        .product-card:hover .product-price { transform: translateX(3px); }

        .sizes-container { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
        .size-box {
            background: white;
            border: 1px solid var(--cream-dark);
            color: var(--text-muted);
            padding: 7px 13px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 0.78rem;
            transition: var(--transition);
            user-select: none;
            font-weight: 500;
        }
        .size-box:hover { border-color: var(--olive); color: var(--olive-dark); transform: translateY(-2px); }
        .size-box.selected { background: var(--olive-dark); border-color: var(--olive-dark); color: white; box-shadow: 0 5px 15px rgba(86, 94, 61, 0.3); }

        .fixed-size-tag {
            margin-top: 12px;
            font-size: 0.85rem;
            color: var(--text-muted);
            background: var(--olive-soft);
            display: inline-block;
            padding: 7px 14px;
            border-radius: 50px;
            width: fit-content;
        }
        .fixed-size-tag strong { color: var(--olive-dark); }
        .price-consult { font-size: 1.05rem; color: var(--olive-dark); font-weight: 600; }

        .add-to-cart {
            background: transparent;
            border: 2px solid var(--navy);
            color: var(--navy);
            padding: 14px;
            border-radius: 50px;
            font-size: 0.9rem;
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 18px;
            position: relative;
            overflow: hidden;
            z-index: 1;
            width: 100%;
            text-align: center;
            text-decoration: none;
            display: block;
            box-sizing: border-box;
        }
        .add-to-cart::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 0%; height: 100%;
            background: var(--navy);
            transition: var(--transition);
            z-index: -1;
        }
        .add-to-cart:hover::before { width: 100%; }
        .add-to-cart:hover { color: white; }
        .add-to-cart:disabled { opacity: 0.5; cursor: not-allowed; }
        .add-to-cart.ask-price { border-color: var(--olive-dark); color: var(--olive-dark); }
        .add-to-cart.ask-price::before { background: var(--olive-dark); }

        .stock-badge {
            position: absolute;
            top: 15px; right: 15px;
            background: var(--olive);
            color: var(--cream);
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            padding: 6px 12px;
            border-radius: 50px;
            z-index: 2;
            box-shadow: 0 6px 16px rgba(86, 94, 61, 0.35);
        }
        .stock-badge.low { background: var(--danger); box-shadow: 0 6px 16px rgba(139, 0, 0, 0.3); }

        /* ============ CART SIDEBAR ============ */
        .overlay {
            position: fixed; inset: 0;
            background: rgba(10, 17, 40, 0.4);
            z-index: 1999;
            opacity: 0; visibility: hidden;
            transition: var(--transition);
        }
        .overlay.open { opacity: 1; visibility: visible; }

        .cart-sidebar {
            position: fixed;
            top: 0;
            right: -500px;
            width: 450px;
            max-width: 92vw;
            height: 100vh;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            border-left: 1px solid var(--cream-dark);
            padding: 40px 30px;
            display: flex;
            flex-direction: column;
            transition: var(--transition);
            z-index: 2000;
            box-shadow: -15px 0 50px rgba(10, 17, 40, 0.15);
        }
        .cart-sidebar.open { right: 0; }

        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--cream-dark);
            padding-bottom: 20px;
            margin-bottom: 25px;
        }
        .cart-header h2 { font-size: 2.2rem; color: var(--navy); }

        .close-cart {
            background: rgba(10, 17, 40, 0.05);
            border: none;
            color: var(--navy);
            width: 40px; height: 40px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            transition: var(--transition);
            display: flex; align-items: center; justify-content: center;
        }
        .close-cart:hover { background: var(--danger); color: white; transform: rotate(90deg) scale(1.1); }

        .cart-items { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; padding-right: 10px; }
        .cart-items::-webkit-scrollbar { width: 5px; }

        .empty-cart { text-align: center; color: var(--text-muted); padding: 60px 20px; }
        .empty-cart svg { width: 60px; height: 60px; opacity: 0.3; margin-bottom: 15px; }

        .cart-item {
            background: var(--cream);
            padding: 15px 18px;
            border-radius: var(--radius);
            display: flex;
            gap: 14px;
            align-items: center;
            border: 1px solid var(--cream-dark);
        }
        .cart-item img { width: 60px; height: 60px; object-fit: cover; border-radius: 10px; flex-shrink: 0; }
        .cart-item-body { flex-grow: 1; min-width: 0; }
        .cart-item-info { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
        .cart-item-info h4 { font-size: 1.05rem; color: var(--navy); margin-bottom: 3px; }
        .cart-item-info span { color: var(--text-muted); font-size: 0.85rem; }

        .qty-controls { display: flex; align-items: center; gap: 10px; background: white; padding: 5px 12px; border-radius: 50px; border: 1px solid var(--cream-dark); margin-top: 8px; width: fit-content; }
        .qty-btn, .remove-btn { background: transparent; border: none; color: var(--navy); cursor: pointer; font-weight: 600; font-size: 1.1rem; transition: var(--transition); }
        .qty-btn:hover { color: var(--gold); transform: scale(1.2); }
        .remove-btn { color: var(--danger); font-size: 1.3rem; }
        .remove-btn:hover { transform: scale(1.2) rotate(10deg); }

        .cart-summary { border-top: 1px solid var(--cream-dark); padding-top: 22px; margin-top: 18px; }
        .summary-row { display: flex; justify-content: space-between; margin-bottom: 12px; color: var(--text-muted); font-size: 1rem; }
        .summary-row.total { color: var(--navy); font-size: 1.5rem; font-weight: 700; border-top: 1px solid var(--cream-dark); padding-top: 18px; margin-top: 8px; }

        .checkout-btn {
            width: 100%;
            background: var(--navy);
            color: var(--cream);
            border: none;
            padding: 19px;
            border-radius: 50px;
            font-size: 1.05rem;
            font-weight: 600;
            font-family: 'Montserrat', sans-serif;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            margin-top: 20px;
            transition: var(--transition);
            box-shadow: 0 10px 25px rgba(10, 17, 40, 0.2);
        }
        .checkout-btn:hover { background: var(--gold); transform: translateY(-3px); box-shadow: 0 15px 35px rgba(197, 160, 89, 0.4); }
        .checkout-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }

        .clear-cart-link { text-align: center; margin-top: 14px; }
        .clear-cart-link button { background: none; border: none; color: var(--text-muted); font-size: 0.85rem; cursor: pointer; text-decoration: underline; }
        .clear-cart-link button:hover { color: var(--danger); }

        /* ============ SEARCH BAR ============ */
        .search-wrap { max-width: 1400px; margin: 0 auto 10px; padding: 0 20px; display: flex; justify-content: center; }
        .search-input {
            width: 100%;
            max-width: 480px;
            padding: 14px 22px;
            border-radius: 50px;
            border: 1px solid var(--cream-dark);
            background: white;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.95rem;
            color: var(--navy);
            transition: var(--transition);
        }
        .search-input:focus { outline: none; border-color: var(--gold); box-shadow: 0 5px 20px rgba(197, 160, 89, 0.2); }

        .no-results { text-align: center; padding: 60px 20px; color: var(--text-muted); font-family: 'Cormorant Garamond', serif; font-size: 1.6rem; font-style: italic; }

        /* ============ WHATSAPP / TOAST ============ */
        .whatsapp-contact {
            position: fixed;
            bottom: 30px;
            left: 30px;
            background: #25D366;
            color: white;
            text-decoration: none;
            padding: 16px 28px;
            border-radius: 50px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 10px 25px rgba(37, 211, 102, 0.3);
            transition: var(--transition);
            z-index: 100;
        }
        .whatsapp-contact:hover { transform: scale(1.05) translateY(-5px); box-shadow: 0 15px 35px rgba(37, 211, 102, 0.5); }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--navy);
            color: var(--cream);
            padding: 16px 28px;
            border-radius: 50px;
            font-weight: 500;
            font-size: 0.95rem;
            box-shadow: 0 15px 35px rgba(10, 17, 40, 0.3);
            z-index: 3000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.35s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .toast.show { opacity: 1; visibility: visible; transform: translateX(-50%) translateY(0); }

        .firework-particle {
            position: fixed;
            width: 8px; height: 8px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            animation: explode 0.8s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }
        @keyframes explode { 0% { transform: scale(1); opacity: 1; } 100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; } }

        footer {
            text-align: center;
            padding: 50px 20px 100px;
            color: var(--text-muted);
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        @media (max-width: 640px) {
            header { padding: 12px 16px; }
            .logo { font-size: 1.3rem; }
            .cart-toggle { padding: 10px 14px; font-size: 0.85rem; }
            .cart-toggle svg { width: 18px; height: 18px; }
            .main-carousel-item { height: 320px; font-size: 2.2rem; }
            .section-title { font-size: 2.1rem; }
            .product-card { min-width: 240px; max-width: 240px; padding: 16px; }
            .product-img { height: 190px; }
            .whatsapp-contact { padding: 12px 18px; font-size: 0.85rem; left: 16px; bottom: 16px; }
            .whatsapp-contact span.wa-text { display: none; }
        }
    </style>

        const categoriesOrder = ["Ropa", "Carteras", "Ropa Interior", "Gorras"];

        // Construir el arreglo plano de productos a partir de categoryDefs
        let products = [];
        let idCounter = 1;
        categoriesOrder.forEach(cat => {
            const def = categoryDefs[cat];
            def.items.forEach((item, i) => {
                products.push({
                    id: idCounter++,
                    name: item.name,
                    category: cat,
                    desc: item.desc,
                    price: item.price,
                    image: item.image || def.images[i % def.images.length],
                    type: def.type,
                    fixedSize: item.fixedSize || null,
                    stock: item.stock !== undefined ? item.stock : 3 + Math.floor(Math.random() * 10)
                });
            });
        });

        let cart = [];
        const phone = "5219221225883";

        /* ============ MENÚ ============ */
        function toggleMenu() {
            document.getElementById('dropdown-menu').classList.toggle('open');
        }
        document.addEventListener('click', function (event) {
            const menu = document.getElementById('dropdown-menu');
            const btn = document.querySelector('.menu-btn');
            if (!menu.contains(event.target) && !btn.contains(event.target)) {
                menu.classList.remove('open');
            }
        });

        function scrollToCategory(cat) {
            const el = document.getElementById(`section-${slug(cat)}`);
            if (el) {
                const headerOffset = 90;
                const elementPosition = el.getBoundingClientRect().top;
                const offsetPosition = elementPosition + window.pageYOffset - headerOffset;
                window.scrollTo({ top: offsetPosition, behavior: "smooth" });
            }
            document.querySelectorAll('#dropdown-menu button').forEach(btn => {
                btn.classList.toggle('active', btn.innerText === cat);
            });
            document.getElementById('dropdown-menu').classList.remove('open');
        }

        function slug(cat) {
            return cat.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/\s+/g, "-");
        }

        /* ============ CONSTRUCCIÓN DE LA TIENDA ============ */
        function buildStore(filter = "") {
            const menuContainer = document.getElementById('dropdown-menu');
            const storeContainer = document.getElementById('store-sections');
            menuContainer.innerHTML = '';
            storeContainer.innerHTML = '';

            const term = filter.trim().toLowerCase();
            let totalMatches = 0;

            categoriesOrder.forEach(cat => {
                let catProducts = products.filter(p => p.category === cat);
                if (term) {
                    catProducts = catProducts.filter(p =>
                        p.name.toLowerCase().includes(term) ||
                        p.desc.toLowerCase().includes(term) ||
                        p.category.toLowerCase().includes(term)
                    );
                }
                if (catProducts.length === 0) return;
                totalMatches += catProducts.length;

                menuContainer.innerHTML += `<button onclick="scrollToCategory('${cat}')">${cat}</button>`;

                const carouselId = `carousel-${slug(cat)}`;
                const def = categoryDefs[cat];
                let sectionHTML = `
                    <section class="category-section" id="section-${slug(cat)}">
                        <div class="section-header">
                            <div class="section-titles">
                                <span class="section-eyebrow">${def.subtitle || ''}</span>
                                <h2 class="section-title">${cat}</h2>
                            </div>
                            <span class="section-count">${catProducts.length} piezas</span>
                        </div>
                        <div class="carousel-wrapper">
                            <button class="mini-carousel-btn mini-prev" onclick="scrollProductCarousel('${carouselId}', -1)" aria-label="Anterior">❮</button>
                            <button class="mini-carousel-btn mini-next" onclick="scrollProductCarousel('${carouselId}', 1)" aria-label="Siguiente">❯</button>
                            <div class="products-carousel" id="${carouselId}">
                `;

                catProducts.forEach(p => {
                    let sizeHTML = '';
                    if (p.fixedSize) {
                        sizeHTML = `<div class="fixed-size-tag">Talla disponible: <strong>${p.fixedSize}</strong></div>`;
                    } else if (p.type !== 'none') {
                        sizeHTML = `<div class="sizes-container" data-required="true">
                            ${sizesMap[p.type].map(s => `<div class="size-box" onclick="selectSize(this, '${s}')">${s}</div>`).join('')}
                        </div>`;
                    }
                    const lowStock = p.stock <= 4;
                    const hasPrice = p.price > 0;
                    const priceHTML = hasPrice
                        ? `$${p.price.toLocaleString('es-MX', { minimumFractionDigits: 2 })}`
                        : `<span class="price-consult">Precio a consultar</span>`;
                    const actionBtn = hasPrice
                        ? `<button class="add-to-cart" onclick="addToCart(event, ${p.id}, this)">Añadir a mi compra</button>`
                        : `<a class="add-to-cart ask-price" href="https://wa.me/${phone}?text=${encodeURIComponent('Hola, me interesa el precio de: ' + p.name)}" target="_blank">Preguntar precio</a>`;
                    sectionHTML += `
                        <div class="product-card">
                            <div class="product-img-wrapper">
                                <span class="stock-badge ${lowStock ? 'low' : ''}">${lowStock ? (p.stock === 1 ? '¡Última pieza!' : '¡Últimas piezas!') : 'Disponible'}</span>
                                <img src="${p.image}" class="product-img" alt="${p.name}" loading="lazy">
                            </div>
                            <div class="product-info">
                                <h3>${p.name}</h3>
                                <p>${p.desc}</p>
                                <div class="product-price">${priceHTML}</div>
                                ${sizeHTML}
                            </div>
                            ${actionBtn}
                        </div>
                    `;
                });

                sectionHTML += `</div></div></section>`;
                storeContainer.innerHTML += sectionHTML;
            });

            if (term && totalMatches === 0) {
                storeContainer.innerHTML = `<div class="no-results">No encontramos productos para "${filter}". Prueba con otra palabra.</div>`;
            }

            initScrollReveal();
        }

        // El efecto de subrayado dorado + aparición del título se activa
        // cuando cada sección entra en pantalla (no solo con hover).
        let revealObserver = null;
        function initScrollReveal() {
            if (revealObserver) revealObserver.disconnect();
            revealObserver = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('revealed');
                    }
                });
            }, { threshold: 0.2 });
            document.querySelectorAll('.category-section').forEach(section => revealObserver.observe(section));
        }

        function filterProducts(value) {
            buildStore(value);
        }

        function selectSize(element, size) {
            const siblings = element.parentElement.children;
            for (let el of siblings) el.classList.remove('selected');
            element.classList.add('selected');
            element.parentElement.dataset.selectedSize = size;
        }

        /* ============ CARRUSELES ============ */
        function scrollMainCarousel(dir) {
            const carousel = document.getElementById('main-carousel');
            carousel.scrollBy({ left: dir * carousel.offsetWidth, behavior: 'smooth' });
        }

        function scrollProductCarousel(id, dir) {
            const carousel = document.getElementById(id);
            if (!carousel) return;
            const cardWidth = 330; // ancho de tarjeta + gap aproximado
            carousel.scrollBy({ left: dir * cardWidth * 2, behavior: 'smooth' });
        }

        /* ============ CARRITO ============ */
        function addToCart(event, productId, btnElement) {
            const product = products.find(p => p.id === productId);
            const card = btnElement.closest('.product-card');
            const sizeContainer = card.querySelector('.sizes-container');

            let selectedSize = product.fixedSize || "Única";
            if (!product.fixedSize && sizeContainer) {
                selectedSize = sizeContainer.dataset.selectedSize;
                if (!selectedSize) {
                    showToast("Por favor, selecciona una talla antes de continuar.");
                    sizeContainer.style.animation = 'none';
                    void sizeContainer.offsetWidth;
                    sizeContainer.style.animation = 'popDopamine 0.4s ease';
                    return;
                }
            }

            const cartItem = cart.find(i => i.id === productId && i.size === selectedSize);
            if (cartItem) {
                if (cartItem.qty >= product.stock) {
                    showToast(`Solo quedan ${product.stock} piezas disponibles de ${product.name}.`);
                    return;
                }
                cartItem.qty++;
            } else {
                cart.push({ ...product, size: selectedSize, qty: 1 });
            }

            updateCartUI();
            createFireworks(event.clientX, event.clientY);
            showToast(`${product.name} añadido a tu compra.`);

            const cartBtn = document.getElementById('cart-btn');
            cartBtn.classList.remove('pop-anim');
            void cartBtn.offsetWidth;
            cartBtn.classList.add('pop-anim');
        }

        function updateCartUI() {
            const itemsContainer = document.getElementById('cart-items');
            const checkoutBtn = document.getElementById('checkout-btn');
            let subtotal = 0;
            let totalQty = 0;

            if (cart.length === 0) {
                itemsContainer.innerHTML = `
                    <div class="empty-cart">
                        <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.5">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M3 3h2l1.5 7.5m0 0L8 18h10l2.5-10.5H6.5z"/>
                        </svg>
                        <p>Tu carrito está vacío.<br>Explora la tienda y añade tus piezas favoritas.</p>
                    </div>`;
            } else {
                itemsContainer.innerHTML = '';
                cart.forEach((item, index) => {
                    subtotal += item.price * item.qty;
                    totalQty += item.qty;
                    itemsContainer.innerHTML += `
                        <div class="cart-item">
                            <img src="${item.image}" alt="${item.name}">
                            <div class="cart-item-body">
                                <div class="cart-item-info">
                                    <div>
                                        <h4>${item.name}</h4>
                                        <span>Talla: ${item.size} · $${item.price.toLocaleString('es-MX')} c/u</span>
                                    </div>
                                    <button class="remove-btn" onclick="removeItem(${index})" aria-label="Eliminar">✖</button>
                                </div>
                                <div class="qty-controls">
                                    <button class="qty-btn" onclick="changeQty(${index}, -1)">−</button>
                                    <span>${item.qty}</span>
                                    <button class="qty-btn" onclick="changeQty(${index}, 1)">+</button>
                                </div>
                            </div>
                        </div>
                    `;
                });
            }

            const tax = subtotal * 0.07;
            const total = subtotal + tax;

            document.getElementById('cart-count').innerText = totalQty;
            document.getElementById('total-qty').innerText = totalQty;
            document.getElementById('subtotal-price').innerText = `$${subtotal.toLocaleString('es-MX', { minimumFractionDigits: 2 })}`;
            document.getElementById('tax-price').innerText = `$${tax.toLocaleString('es-MX', { minimumFractionDigits: 2 })}`;
            document.getElementById('total-price').innerText = `$${total.toLocaleString('es-MX', { minimumFractionDigits: 2 })}`;
            checkoutBtn.disabled = cart.length === 0;
        }

        function changeQty(index, delta) {
            const item = cart[index];
            const product = products.find(p => p.id === item.id);
            if (delta > 0 && item.qty >= product.stock) {
                showToast(`Solo quedan ${product.stock} piezas disponibles.`);
                return;
            }
            item.qty += delta;
            if (item.qty <= 0) cart.splice(index, 1);
            updateCartUI();
        }

        function removeItem(index) {
            cart.splice(index, 1);
            updateCartUI();
        }

        function clearCart() {
            if (cart.length === 0) return;
            if (confirm("¿Deseas vaciar todo tu carrito?")) {
                cart = [];
                updateCartUI();
            }
        }

        function toggleCart() {
            document.getElementById('cart-sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('open');
        }

        function checkout() {
            if (cart.length === 0) {
                showToast("Tu carrito está vacío.");
                return;
            }

            let msg = `*Hola Gabachin Store, deseo procesar la siguiente orden:*%0A%0A`;
            let subtotal = 0;
            let totalQty = 0;

            cart.forEach(item => {
                msg += `- ${item.qty}x ${item.name} (Talla: ${item.size}) - $${(item.price * item.qty).toLocaleString('es-MX')}%0A`;
                subtotal += item.price * item.qty;
                totalQty += item.qty;
            });

            const tax = subtotal * 0.07;
            const total = subtotal + tax;

            msg += `%0A*Resumen de Compra:*%0A`;
            msg += `Piezas totales: ${totalQty}%0A`;
            msg += `Subtotal: $${subtotal.toLocaleString('es-MX', { minimumFractionDigits: 2 })}%0A`;
            msg += `Impuestos (7%): $${tax.toLocaleString('es-MX', { minimumFractionDigits: 2 })}%0A`;
            msg += `*TOTAL: $${total.toLocaleString('es-MX', { minimumFractionDigits: 2 })} MXN*%0A%0A`;
            msg += `Quedo a la espera de sus indicaciones para el pago.`;

            window.open(`https://wa.me/${phone}?text=${msg}`, '_blank');
        }

        /* ============ TOAST + FUEGOS ARTIFICIALES ============ */
        let toastTimer = null;
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.innerText = message;
            toast.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => toast.classList.remove('show'), 2600);
        }

        function createFireworks(x, y) {
            const colors = ['#C5A059', '#b08d4b', '#E8E3D9', '#0A1128'];
            for (let i = 0; i < 20; i++) {
                const particle = document.createElement('div');
                particle.className = 'firework-particle';
                particle.style.left = x + 'px';
                particle.style.top = y + 'px';
                particle.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];

                const angle = Math.random() * Math.PI * 2;
                const distance = Math.random() * 80 + 30;
                const tx = Math.cos(angle) * distance;
                const ty = Math.sin(angle) * distance;

                particle.style.setProperty('--tx', `${tx}px`);
                particle.style.setProperty('--ty', `${ty}px`);

                document.body.appendChild(particle);
                setTimeout(() => particle.remove(), 800);
            }
        }

        /* ============ INICIALIZAR ============ */
        buildStore();
        updateCartUI();
    </script>
</body>
</html>
